<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">

            <div class="panel">
                <h3>HOME</h3>
                <div class="screen">
                    <div class="score-num" id="home-score">0</div>
                </div>
                <div class="btn-board">
                    <button onclick="addScore('home', 1)">+1</button>
                    <button onclick="addScore('home', 2)">+2</button>
                    <button onclick="addScore('home', 3)">+3</button>
                </div>
            </div>

            <div class="panel">
                <h3>AWAY</h3>
                <div class="screen">
                    <div class="score-num" id="guest-score">0</div>
                </div>
                <div class="btn-board">
                    <button onclick="addScore('guest', 1)">+1</button>
                    <button onclick="addScore('guest', 2)">+2</button>
                    <button onclick="addScore('guest', 3)">+3</button>
                </div>
            </div>

        </div>

        <script src="index.js"></script>
    </body>
</html>
